name: Deploy Website Builder (Open Source Coolify)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Coolify (Open Source)
        uses: coolify/cli@v1
        with:
          api-token: ${{ secrets.COOLIFY_TOKEN }}
          server-url: ${{ secrets.COOLIFY_SERVER }}
          app-id: ${{ secrets.COOLIFY_APP_ID }}
          working-directory: ./dist
